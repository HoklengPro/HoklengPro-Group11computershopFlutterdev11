name: csf_f
description: Nexus computer shop Flutter UI (converted from prototype).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  http: ^1.2.2
  flutter_svg: ^2.0.17
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/nexus_app_icon.png
  adaptive_icon_background: "#0B1020"
  adaptive_icon_foreground: assets/nexus_app_icon.png
  web:
    generate: true
    image_path: assets/nexus_app_icon.png
  macos:
    generate: true
    image_path: assets/nexus_app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/nexus_app_icon.png
